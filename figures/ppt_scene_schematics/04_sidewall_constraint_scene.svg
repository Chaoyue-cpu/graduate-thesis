<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12161b"/>
      <stop offset="100%" stop-color="#252a30"/>
    </linearGradient>
    <linearGradient id="floor4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6f757a"/>
      <stop offset="50%" stop-color="#888e93"/>
      <stop offset="100%" stop-color="#70767b"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #f3f5f7; }
      .sub { font: 500 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #b9c0c7; }
      .label { font: 600 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #eef2f5; }
      .small { font: 500 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #d8dde2; }
    </style>
  </defs>

  <rect width="1400" height="520" fill="url(#bg4)"/>
  <rect x="36" y="30" width="370" height="70" rx="18" fill="#0d1116" fill-opacity="0.62" stroke="#3a444d"/>
  <text x="62" y="72" class="title">侧壁方向辅助约束</text>
  <text x="62" y="97" class="sub">滑动窗口参考方向 + 当前观测</text>

  <polyline points="120,270 1210,270"
