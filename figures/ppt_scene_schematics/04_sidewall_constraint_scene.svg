  <polyline points="120,270 1210,270"
            fill="none" stroke="#41484f" stroke-width="156" stroke-linejoin="round"/>
  <polyline points="120,270 1210,270"
            fill="none" stroke="url(#floor4)" stroke-width="136" stroke-linejoin="round"/>
  <polyline points="120,270 1210,270"
            fill="none" stroke="#ebd45c" stroke-width="6" stroke-linejoin="round" stroke-dasharray="22 14" stroke-opacity="0.9"/>

  <g fill="#ffd87a" opacity="0.82">
    <circle cx="240" cy="270" r="5"/><circle cx="380" cy="270" r="5"/><circle cx="520" cy="270" r="5"/>
    <circle cx="660" cy="270" r="5"/><circle cx="800" cy="270" r="5"/><circle cx="940" cy="270" r="5"/>
  </g>

  <rect x="170" y="148" width="720" height="234" rx="28" fill="#dfe5eb" fill-opacity="0.06" stroke="#c0c7ce" stroke-width="3" stroke-dasharray="12 12"/>
  <text x="435" y="132" class="label" fill="#dbe2e9">滑动窗口</text>

  <g fill="#12161b" stroke="#ffffff" stroke-width="4">
    <circle cx="220" cy="270" r="10"/><circle cx="380" cy="270" r="10"/><circle cx="540" cy="270" r="10"/>
    <circle cx="700" cy="270" r="10"/><circle cx="980" cy="270" r="10"/>
  </g>
  <text x="205" y="304" class="label">K1</text>
  <text x="365" y="304" class="label">K2</text>
  <text x="525" y="304" class="label">K3</text>
  <text x="685" y="304" class="label">K4</text>
  <text x="965" y="304" class="label">K5</text>

  <g stroke="#79c7ff" stroke-width="8" stroke-linecap="round" opacity="0.95">
    <line x1="220" y1="270" x2="272" y2="202"/>
    <line x1="380" y1="270" x2="430" y2="205"/>
    <line x1="540" y1="270" x2="588" y2="210"/>
    <line x1="700" y1="270" x2="752" y2="198"/>
    <line x1="980" y1="270" x2="1050" y2="236"/>
