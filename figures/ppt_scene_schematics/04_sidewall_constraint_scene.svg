  <line x1="980" y1="270" x2="1038" y2="192" stroke="#ff6f6f" stroke-width="8" stroke-linecap="round"/>
  <polygon points="1038,192 1032,224 1009,208" fill="#ff6f6f"/>
  <text x="1064" y="195" class="label" fill="#ff9c9c">n̄i</text>
  <text x="1045" y="257" class="label" fill="#9ed5ff">ni</text>

  <path d="M 1014 252 A 56 56 0 0 0 1038 217" fill="none" stroke="#eef2f6" stroke-width="4"/>
  <text x="995" y="214" class="label">φi</text>

  <rect x="970" y="380" width="325" height="84" rx="18" fill="#0d1116" fill-opacity="0.70" stroke="#39424a"/>
  <text x="995" y="413" class="label">适合你的 PPT 说法</text>
  <text x="995" y="440" class="small">窗口内累积侧壁方向形成参考方向，再约束当前帧。</text>
