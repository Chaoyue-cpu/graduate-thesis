  <polyline points="110,290 540,290 650,130 1280,130"
            fill="none" stroke="#ebd45c" stroke-width="6" stroke-linejoin="round" stroke-dasharray="22 14" stroke-opacity="0.9"/>

  <line x1="980" y1="130" x2="980" y2="36" stroke="#0b0e12" stroke-opacity="0.30" stroke-width="118"/>
  <line x1="980" y1="130" x2="980" y2="36" stroke="#41484f" stroke-width="102"/>
  <line x1="980" y1="130" x2="980" y2="36" stroke="url(#floor2)" stroke-width="88"/>
  <line x1="1180" y1="130" x2="1180" y2="236" stroke="#0b0e12" stroke-opacity="0.30" stroke-width="118"/>
  <line x1="1180" y1="130" x2="1180" y2="236" stroke="#41484f" stroke-width="102"/>
  <line x1="1180" y1="130" x2="1180" y2="236" stroke="url(#floor2)" stroke-width="88"/>

  <g fill="#ffd87a" opacity="0.80">
    <circle cx="210" cy="290" r="5"/><circle cx="320" cy="290" r="5"/><circle cx="430" cy="290" r="5"/>
    <circle cx="575" cy="240" r="5"/><circle cx="610" cy="185" r="5"/>
    <circle cx="760" cy="130" r="5"/><circle cx="920" cy="130" r="5"/><circle cx="1080" cy="130" r="5"/><circle cx="1240" cy="130" r="5"/>
  </g>

  <circle cx="180" cy="290" r="10" fill="#11161b" stroke="#ffffff" stroke-width="4"/>
  <circle cx="420" cy="290" r="10" fill="#11161b" stroke="#ffffff" stroke-width="4"/>
  <circle cx="540" cy="290" r="10" fill="#11161b" stroke="#ffffff" stroke-width="4"/>
  <circle cx="650" cy="130" r="10" fill="#11161b" stroke="#ffffff" stroke-width="4"/>
  <text x="164" y="323" class="label">P₁</text>
  <text x="404" y="323" class="label">P₂</text>
  <text x="553" y="323" class="label">P₃</text>
  <text x="665" y="122" class="label">P₄</text>

  <line x1="180" y1="290" x2="420" y2="290" stroke="#6fc2ff" stroke-width="8" stroke-linecap="round"/>
  <polygon points="420,290 392,278 392,302" fill="#6fc2ff"/>
  <line x1="540" y1="290" x2="650" y2="130" stroke="#ff6f6f" stroke-width="8" stroke-linecap="round"/>
  <polygon points="650,130 645,160 621,144" fill="#ff6f6f"/>

  <path d="M 380 290 A 150 150 0 0 0 555 182" fill="none" stroke="#f3f6fa" stroke-width="4"/>
  <rect x="430" y="180" width="120" height="42" rx="14" fill="#0d1116" fill-opacity="0.78" stroke="#5d6770"/>
  <text x="452" y="208" class="label">θ<tspan dy="-6" font-size="14">exp</tspan></text>

  <text x="235" y="252" class="small" fill="#9dd6ff">第一段方向 d₁₂</text>
  <text x="650" y="230" class="small" fill="#ff9b9b">第二段方向 d₃₄</text>

  <text x="947" y="28" class="small">支巷 A</text>
  <text x="1194" y="262" class="small">支巷 B</text>

  <rect x="1005" y="395" width="325" height="86" rx="18" fill="#0d1116" fill-opacity="0.70" stroke="#39424a"/>
  <text x="1030" y="428" class="label">适合 PPT 的讲法</text>
  <text x="1030" y="455" class="small">先展示巷道转弯，再说明“四点确定两段方向”。</text>
