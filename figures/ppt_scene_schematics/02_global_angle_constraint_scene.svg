<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13171c"/>
      <stop offset="100%" stop-color="#252a30"/>
    </linearGradient>
    <linearGradient id="floor2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#70767b"/>
      <stop offset="55%" stop-color="#8c9297"/>
      <stop offset="100%" stop-color="#71777c"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #f3f5f7; }
      .sub { font: 500 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #b9c0c7; }
      .label { font: 600 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #eef2f5; }
      .small { font: 500 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #d8dde2; }
    </style>
  </defs>

  <rect width="1400" height="520" fill="url(#bg2)"/>
  <rect x="36" y="30" width="330" height="70" rx="18" fill="#0d1116" fill-opacity="0.62" stroke="#3a444d"/>
  <text x="62" y="72" class="title">全局角度约束</text>
  <text x="62" y="97" class="sub">结合三段巷道转折关系</text>

  <polyline points="110,290 540,290 650,130 1280,130"
