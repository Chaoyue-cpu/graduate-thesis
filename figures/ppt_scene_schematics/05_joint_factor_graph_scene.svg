<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11151a"/>
      <stop offset="100%" stop-color="#252a30"/>
    </linearGradient>
    <linearGradient id="floor5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6f757a"/>
      <stop offset="50%" stop-color="#888e93"/>
      <stop offset="100%" stop-color="#70767b"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #f3f5f7; }
      .sub { font: 500 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #b9c0c7; }
      .label { font: 600 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #eef2f5; }
      .small { font: 500 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #d8dde2; }
    </style>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eef2f5"/>
    </marker>
  </defs>

  <rect width="1500" height="620" fill="url(#bg5)"/>
  <rect x="38" y="30" width="430" height="72" rx="18" fill="#0d1116" fill-opacity="0.62" stroke="#3a444d"/>
  <text x="64" y="74" class="title">多因子联合优化模型</text>
  <text x="64" y="100" class="sub">把论文里的五类约束叠到真实巷道结构上</text>

  <polyline points="100,340 500,340 620,190 1280,190"
            fill="none" stroke="#0b0e12" stroke-opacity="0.30" stroke-width="178" stroke-linejoin="round"/>
  <polyline points="100,340 500,340 620,190 1280,190"
            fill="none" stroke="#41484f" stroke-width="156" stroke-linejoin="round"/>
  <polyline points="100,340 500,340 620,190 1280,190"
            fill="none" stroke="url(#floor5)" stroke-width="136" stroke-linejoin="round"/>
  <polyline points="100,340 500,340 620,190 1280,190"
            fill="none" stroke="#ebd45c" stroke-width="6" stroke-linejoin="round" stroke-dasharray="22 14" stroke-opacity="0.9"/>

  <line x1="980" y1="190" x2="980" y2="70" stroke="#0b0e12" stroke-opacity="0.30" stroke-width="118"/>
  <line x1="980" y1="190" x2="980" y2="70" stroke="#41484f" stroke-width="102"/>
  <line x1="980" y1="190" x2="980" y2="70" stroke="url(#floor5)" stroke-width="88"/>
  <line x1="1180" y1="190" x2="1180" y2="314" stroke="#0b0e12" stroke-opacity="0.30" stroke-width="118"/>
  <line x1="1180" y1="190" x2="1180" y2="314" stroke="#41484f" stroke-width="102"/>
  <line x1="1180" y1="190" x2="1180" y2="314" stroke="url(#floor5)" stroke-width="88"/>

  <g fill="#11161b" stroke="#ffffff" stroke-width="4">
    <circle cx="180" cy="340" r="10"/><circle cx="360" cy="340" r="10"/><circle cx="500" cy="340" r="10"/>
    <circle cx="620" cy="190" r="10"/><circle cx="920" cy="190" r="10"/>
  </g>
  <text x="158" y="374" class="label">T1</text>
  <text x="338" y="374" class="label">T2</text>
  <text x="478" y="374" class="label">T3</text>
  <text x="598" y="180" class="label">T4</text>
  <text x="898" y="180" class="label">T5</text>

  <path d="M 360 308 C 420 210, 470 170, 620 170" fill="none" stroke="#ffae42" stroke-width="6" stroke-dasharray="14 10"/>
  <text x="430" y="162" class="label" fill="#ffc67b">长度约束</text>

  <path d="M 180 306 C 250 110, 470 105, 920 156" fill="none" stroke="#ff6f6f" stroke-width="6" stroke-dasharray="14 10"/>
  <text x="515" y="110" class="label" fill="#ff9a9a">角度约束</text>

  <rect x="300" y="448" width="150" height="56" rx="16" fill="#7b4de0" fill-opacity="0.22" stroke="#ae93ff"/>
  <text x="330" y="484" class="label">地面约束</text>
  <line x1="375" y1="448" x2="360" y2="352" stroke="#eef2f5" stroke-width="4" stroke-dasharray="10 8"/>

  <rect x="650" y="448" width="150" height="56" rx="16" fill="#7b4de0" fill-opacity="0.22" stroke="#ae93ff"/>
  <text x="680" y="484" class="label">侧壁约束</text>
  <line x1="725" y1="448" x2="620" y2="202" stroke="#eef2f5" stroke-width="4" stroke-dasharray="10 8"/>

  <text x="948" y="54" class="small">支巷 A</text>
  <text x="1194" y="338" class="small">支巷 B</text>

  <rect x="1235" y="160" width="190" height="78" rx="18" fill="#5d1f1f" fill-opacity="0.38" stroke="#ff9d9d"/>
  <text x="1264" y="207" class="label">统一图优化</text>
  <line x1="920" y1="190" x2="1235" y2="199" stroke="#eef2f5" stroke-width="5" marker-end="url(#arrow5)"/>
  <line x1="450" y1="476" x2="1235" y2="223" stroke="#eef2f5" stroke-width="3" stroke-opacity="0.55"/>
  <line x1="800" y1="476" x2="1235" y2="223" stroke="#eef2f5" stroke-width="3" stroke-opacity="0.55"/>

  <rect x="1010" y="500" width="390" height="78" rx="18" fill="#0d1116" fill-opacity="0.70" stroke="#39424a"/>
  <text x="1035" y="534" class="label">PPT 里最好先讲这张总图</text>
  <text x="1035" y="561" class="small">再分别切到长度、角度、地面、侧壁四张细图，逻辑会最顺。</text>
</svg>
