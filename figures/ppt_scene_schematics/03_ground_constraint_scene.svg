<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101317"/>
      <stop offset="100%" stop-color="#23282e"/>
    </linearGradient>
    <linearGradient id="wall3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d6268"/>
      <stop offset="100%" stop-color="#30353a"/>
    </linearGradient>
    <linearGradient id="floor3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8085"/>
      <stop offset="100%" stop-color="#4b5157"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #f3f5f7; }
      .sub { font: 500 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #b9c0c7; }
      .label { font: 600 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #eef2f5; }
      .small { font: 500 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #d8dde2; }
      .axis { stroke: #eaf0f6; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eaf0f6"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5fd0ff"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6f6f"/>
    </marker>
  </defs>

  <rect width="1500" height="720" fill="url(#bg3)"/>
  <rect x="38" y="30" width="390" height="74" rx="18" fill="#0d1116" fill-opacity="0.64" stroke="#3a444d"/>
  <text x="64" y="74" class="title">地面位姿 - 平面辅助约束</text>
  <text x="64" y="100" class="sub">真实巷道质感示意</text>

  <g transform="translate(70,120)">
    <polygon points="90,70 470,70 360,250 200,250" fill="#444a51" stroke="#1e2328" stroke-width="4"/>
    <polygon points="140,250 420,250 500,510 60,510" fill="url(#floor3)" stroke="#1e2328" stroke-width="4"/>
    <polygon points="90,70 200,250 60,510 20,410" fill="url(#wall3)" stroke="#1e2328" stroke-width="4"/>
    <polygon points="470,70 360,250 500,510 540,410" fill="url(#wall3)" stroke="#1e2328" stroke-width="4"/>
    <rect x="215" y="322" width="170" height="78" rx="18" fill="#59d0ff" fill-opacity="0.26" stroke="#7ad9ff" stroke-width="3"/>
    <text x="172" y="302" class="label" fill="#8de0ff">全局参考地面平面 πg</text>
    <line x1="90" y1="70" x2="470" y2="70" stroke="#f5d77e" stroke-width="7" stroke-dasharray="12 12" opacity="0.65"/>
    <g fill="#f7e09a" opacity="0.85">
      <ellipse cx="280" cy="122" rx="18" ry="7"/><ellipse cx="280" cy="194" rx="14" ry="6"/><ellipse cx="280" cy="252" rx="11" ry="5"/>
    </g>
    <line x1="95" y1="470" x2="95" y2="350" class="axis"/>
    <line x1="95" y1="470" x2="215" y2="470" class="axis"/>
    <text x="68" y="344" class="small">zg</text>
    <text x="224" y="478" class="small">xg</text>
  </g>

  <line x1="640" y1="320" x2="850" y2="320" stroke="#edf2f7" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="685" y="281" width="120" height="46" rx="14" fill="#0d1116" fill-opacity="0.78" stroke="#5d6770"/>
  <text x="728" y="312" class="label">Ti</text>

  <g transform="translate(860,120)">
    <polygon points="90,70 470,70 360,250 200,250" fill="#444a51" stroke="#1e2328" stroke-width="4"/>
    <polygon points="140,250 420,250 500,510 60,510" fill="url(#floor3)" stroke="#1e2328" stroke-width="4"/>
    <polygon points="90,70 200,250 60,510 20,410" fill="url(#wall3)" stroke="#1e2328" stroke-width="4"/>
    <polygon points="470,70 360,250 500,510 540,410" fill="url(#wall3)" stroke="#1e2328" stroke-width="4"/>
    <polygon points="220,300 355,282 388,385 245,402" fill="#ff9a55" fill-opacity="0.30" stroke="#ffb37a" stroke-width="3"/>
    <text x="228" y="270" class="label" fill="#ffc89c">局部观测平面 πi</text>
    <line x1="280" y1="330" x2="280" y2="228" stroke="#ff6f6f" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowRed)"/>
    <text x="296" y="236" class="small" fill="#ff9b9b">残差 eg,i</text>
    <g fill="#f7e09a" opacity="0.85">
      <ellipse cx="280" cy="122" rx="18" ry="7"/><ellipse cx="280" cy="194" rx="14" ry="6"/><ellipse cx="280" cy="252" rx="11" ry="5"/>
    </g>
    <line x1="102" y1="470" x2="102" y2="360" class="axis"/>
    <line x1="102" y1="470" x2="215" y2="470" class="axis"/>
    <text x="72" y="355" class="small">zi</text>
    <text x="223" y="478" class="small">xi</text>
  </g>

  <rect x="470" y="610" width="560" height="74" rx="18" fill="#0d1116" fill-opacity="0.70" stroke="#39424a"/>
  <text x="495" y="642" class="label">PPT 展示建议</text>
  <text x="495" y="669" class="small">左侧讲“理想水平参考平面”，右侧讲“当前关键帧检测到的地面平面”，中间用 Ti 连接。</text>
</svg>
